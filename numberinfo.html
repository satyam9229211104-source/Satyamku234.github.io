<!DOCTYPE html>
<html>
<head>
<title>Phone Number Info - Satyam's Cyber Portal</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

input{
padding:10px;
width:250px;
border-radius:8px;
border:none;
margin:10px;
}

button{
padding:10px 20px;
background:#00ff9d;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:20px;
background:#1e293b;
padding:20px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>📱 Phone Number Information Tool</h1>

<input id="phone" placeholder="+919876543210">

<br>

<button onclick="lookup()">Get Info</button>

<div class="result" id="result"></div>

<script>

async function lookup(){

let phone = document.getElementById("phone").value;

let url = "https://api.apilayer.com/number_verification/validate?number=" + phone;

let res = await fetch(url,{
headers:{
"apikey":"YOUR_API_KEY"
}
});

let data = await res.json();

document.getElementById("result").innerHTML = `
<p><b>Valid:</b> ${data.valid}</p>
<p><b>Country:</b> ${data.country_name}</p>
<p><b>Location:</b> ${data.location}</p>
<p><b>Carrier:</b> ${data.carrier}</p>
<p><b>Line Type:</b> ${data.line_type}</p>
`;

}

</script>

</body>
</html>
