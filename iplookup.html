<!DOCTYPE html>
<html>
<head>
<title>IP Location Finder</title>

<style>
body{
background:black;
color:#00ff00;
font-family:Courier New;
text-align:center;
padding-top:60px;
}

input{
padding:10px;
background:black;
border:2px solid #00ff00;
color:#00ff00;
}

button{
padding:10px 20px;
background:black;
border:2px solid #00ff00;
color:#00ff00;
cursor:pointer;
}

#map{
margin-top:20px;
width:90%;
height:400px;
border:2px solid #00ff00;
}
</style>
</head>

<body>

<h1>IP Location Finder</h1>

<input id="ip" placeholder="Enter IP Address">
<button onclick="lookup()">Locate</button>

<div id="result"></div>
<iframe id="map"></iframe>

<script>

async function lookup(){

let ip=document.getElementById("ip").value;

let res=await fetch("http://ip-api.com/json/"+ip);
let data=await res.json();

document.getElementById("result").innerHTML=
"Country: "+data.country+"<br>"+
"City: "+data.city+"<br>"+
"ISP: "+data.isp;

document.getElementById("map").src=
"https://maps.google.com/maps?q="+data.lat+","+data.lon+"&z=10&output=embed";

}

</script>

</body>
</html>
