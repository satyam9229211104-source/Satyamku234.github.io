<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

.login-box{
background:#020617;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 0 20px rgba(0,255,150,0.2);
text-align:center;
}

.login-box h2{
color:#22c55e;
margin-bottom:25px;
}

.input-box{
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:6px;
background:#111827;
color:white;
}

.input-box input:focus{
box-shadow:0 0 8px #22c55e;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.footer{
margin-top:15px;
font-size:13px;
color:#9ca3af;
}
</style>

</head>

<body>

<a href="iplookup.html">IP Location Tool</a>
<br>
<a href="username.html">Username Finder</a>
<div class="login-box">
<h2>Secure Login</h2>
  
<form>
<div class="input-box">
<input type="text" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

<div class="footer">
Protected System Access
</div>
</form>

</div>

</body>
</html>
