<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<title>Satyam's Cyber Portal</title><style>

/* Page background */

body{
margin:0;
font-family:Arial, sans-serif;
background:url("bg.jpg") no-repeat center center;
background-size:cover;
height:100vh;
color:#00ffff;
}

/* Dark overlay */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* Header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.8);
border-bottom:1px solid #00ffff;
box-shadow:0 0 10px #00ffff;
}

.logo{
font-size:22px;
font-weight:bold;
color:#00ffff;
}

/* Navigation */

nav a{
margin-left:20px;
text-decoration:none;
color:#00ffff;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:white;
text-shadow:0 0 10px #00ffff;
}

/* Main container */

.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
flex-direction:column;
text-align:center;
}

/* Cyber panel */

.panel{
border:2px solid #00ffff;
padding:40px;
width:350px;
background:rgba(0,0,0,0.7);
box-shadow:0 0 25px #00ffff;
border-radius:10px;
margin-bottom:25px;
}

.icon{
font-size:70px;
color:yellow;
}

.title{
color:#ff3b3b;
font-size:28px;
margin-top:10px;
}

.subtitle{
color:#00ffff;
}

/* Buttons */

.buttons{
display:flex;
gap:15px;
}

button{
padding:12px 25px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
background:#00ffff;
color:black;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#00aaff;
transform:scale(1.1);
box-shadow:0 0 10px #00ffff;
}

</style></head><body><header><div class="logo">⚡ Satyam's Cyber Portal</div><nav>
<a href="index.html">Home</a>
<a href="tools.html">Tools</a>
<a href="login.html">Login</a>
<a href="register.html">Register</a>
</nav></header><div class="container"><div class="panel"><div class="icon">⚠</div><div class="title">Satyam's Cyber Portal</div><div class="subtitle">Cyber Tools & Utilities</div></div><div class="buttons"><button onclick="location.href='login.html'">Login</button>

<button onclick="location.href='register.html'">Register</button>

<button onclick="location.href='tools.html'">Tools</button>

</div></div></body></html>
