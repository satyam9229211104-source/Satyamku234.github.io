<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Security Portal</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;

    /* Background image */
    background:url("bg.jpg") no-repeat center center/cover;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* Dark overlay */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    z-index:-1;
}

.container{
    text-align:center;
}

.panel{
    border:2px solid #00ffff;
    padding:40px;
    width:340px;
    background:rgba(0,0,0,0.6);
    box-shadow:0 0 25px #00ffff;
    margin-bottom:30px;
}

.icon{
    font-size:70px;
    color:yellow;
}

.title{
    color:#ff3b3b;
    font-size:28px;
    margin-top:10px;
}

.subtitle{
    color:#00ffff;
}

.buttons{
    display:flex;
    gap:15px;
    justify-content:center;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    background:#00ffff;
    color:black;
    transition:0.3s;
}

button:hover{
    background:#00aaff;
    transform:scale(1.1);
    box-shadow:0 0 10px #00ffff;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">
<div class="icon">⚠</div>
<div class="title">Cyber Portal</div>
<div class="subtitle">Secure Access Interface</div>
</div>

<div class="buttons">
<button onclick="location.href='login.html'">Login</button>
<button onclick="location.href='register.html'">Register</button>
<button onclick="location.href='tools.html'">Tools</button>
</div>

</div>

</body>
</html>
