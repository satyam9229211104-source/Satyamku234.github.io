<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>

body{
font-family: Arial, sans-serif;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#b92bff,#2ec5ff);
}

.container{
background:white;
padding:30px;
width:320px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

.input-box{
margin:15px 0;
text-align:left;
}

.input-box input{
width:100%;
padding:10px;
border:none;
border-bottom:2px solid #ccc;
outline:none;
font-size:15px;
}

.forgot{
text-align:right;
font-size:12px;
margin-top:5px;
}

.login-btn{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:25px;
background: linear-gradient(90deg,#2ec5ff,#b92bff);
color:white;
font-size:16px;
cursor:pointer;
}

.social{
margin-top:20px;
}

.social img{
width:35px;
margin:10px;
cursor:pointer;
}

.tools{
margin-top:25px;
}

.tool-btn{
display:block;
margin:10px 0;
padding:10px;
background:#f2f2f2;
border-radius:8px;
text-decoration:none;
color:black;
font-weight:bold;
}

.tool-btn:hover{
background:#ddd;
}

</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<div class="input-box">
<input type="text" placeholder="Type your username">
</div>

<div class="input-box">
<input type="password" placeholder="Type your password">
<div class="forgot">Forgot password?</div>
</div>

<button class="login-btn">LOGIN</button>

<div class="social">
<p>Or Sign Up Using</p>
<img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
<img src="https://cdn-icons-png.flaticon.com/512/124/124021.png">
<img src="https://cdn-icons-png.flaticon.com/512/281/281764.png">
</div>

<div class="tools">
<a class="tool-btn" href="iplookup.html">IP Tracker</a>
<a class="tool-btn" href="username.html">Username Finder</a>
</div>

</div>

</body>
</html>
